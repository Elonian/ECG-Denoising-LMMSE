project_root: /mntdatalora/src/ECG-Denoising-LMMSE

base_config: configs/transformer.yaml

architecture_sweep:
  - name: small
    d_model: 32
    nhead: 4
    num_layers: 2
    dim_feedforward: 128
    dropout: 0.1
  - name: medium
    d_model: 64
    nhead: 4
    num_layers: 3
    dim_feedforward: 256
    dropout: 0.1
  - name: deep
    d_model: 64
    nhead: 8
    num_layers: 4
    dim_feedforward: 256
    dropout: 0.1

window_sweep:
  orders: [8, 16, 32, 64, 128]
  architecture_name: medium

training:
  epochs: 200
  batch_size: 256
  learning_rate: 1.0e-3
  validation_fraction: 0.15
  seed: 0
